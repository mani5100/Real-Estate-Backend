{% extends "base.html" %}
{% block title %}Complete Your Profile{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-check fs-1 text-dark"></i>
                    <h4 class="fw-bold mt-2">Almost There</h4>
                    <p class="text-muted small">Just one more step to complete your profile</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="+923001234567"
                        >
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        Complete Setup
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
