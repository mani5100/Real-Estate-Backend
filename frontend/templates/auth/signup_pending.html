{% extends "base.html" %}
{% block title %}Application Pending{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <i class="bi bi-hourglass-split fs-1 text-warning mb-3"></i>
        <h4 class="fw-bold">Application Under Review</h4>
        <p class="text-muted">
            Your agent application has been submitted successfully.
            An admin will review it shortly. Once approved you can
            login and access your dashboard.
        </p>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-dark mt-2">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
