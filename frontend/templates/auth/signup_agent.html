{% extends "base.html" %}
{% block title %}Agent Application{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-1 fw-bold">Agent Application</h4>
                <p class="text-muted small mb-4">Submit your details for review</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">License Number</label>
                        <input type="text" name="license_number" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
