{% extends "base.html" %}
{% block title %}Choose Role{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <h4 class="text-center mb-4 fw-bold">What brings you here?</h4>
        <div class="row g-3">
            <div class="col-6">
                <a href="{{ url_for('onboarding_customer') }}" class="text-decoration-none">
                    <div class="card text-center p-4 h-100 border-2">
                        <i class="bi bi-person-heart fs-1 mb-3 text-dark"></i>
                        <h5 class="fw-bold">Browse Properties</h5>
                        <p class="text-muted small mb-0">I want to find a property to rent or buy</p>
                    </div>
                </a>
            </div>
            <div class="col-6">
                <a href="{{ url_for('onboarding_agent') }}" class="text-decoration-none">
                    <div class="card text-center p-4 h-100 border-2">
                        <i class="bi bi-briefcase fs-1 mb-3 text-dark"></i>
                        <h5 class="fw-bold">I am an Agent</h5>
                        <p class="text-muted small mb-0">I want to list properties and manage leads</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
