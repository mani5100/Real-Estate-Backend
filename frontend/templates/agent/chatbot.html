{% extends "base.html" %}
{% block title %}Agent Chatbot{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">
                <i class="bi bi-chat-dots"></i> Lead Assistant
            </h4>
            <button class="btn btn-outline-dark btn-sm" id="clearBtn">
                <i class="bi bi-arrow-counterclockwise"></i> New Session
            </button>
        </div>

        <!-- Chat Window -->
        <div class="card border-0 shadow-sm">
            <div
                class="card-body p-4"
                id="chatWindow"
                style="height: 500px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;"
            >
                <!-- Messages render here -->
            </div>

            <div class="card-footer bg-white border-top p-3">
                <div class="input-group">
                    <input
                        type="text"
                        id="messageInput"
                        class="form-control"
                        placeholder="Type a message..."
                        autocomplete="off"
                    >
                    <button class="btn btn-dark" id="sendBtn">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let history = [];
    let isLoading = false;

    const chatWindow = document.getElementById("chatWindow");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");

    // ── Render a message bubble ──────────────────────────────────────────
    function addMessage(role, text) {
        const isAgent = role === "agent";
        const wrapper = document.createElement("div");
        wrapper.style.cssText = `
            display: flex;
            justify-content: ${isAgent ? "flex-end" : "flex-start"};
        `;

        const bubble = document.createElement("div");
        bubble.style.cssText = `
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            background: ${isAgent ? "#212529" : "#f1f3f5"};
            color: ${isAgent ? "#fff" : "#212529"};
            white-space: pre-wrap;
        `;
        bubble.textContent = text;
        wrapper.appendChild(bubble);
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ── Typing indicator ─────────────────────────────────────────────────
    function showTyping() {
        const wrapper = document.createElement("div");
        wrapper.id = "typingIndicator";
        wrapper.style.cssText = "display: flex; justify-content: flex-start;";

        const bubble = document.createElement("div");
        bubble.style.cssText = `
            padding: 10px 14px;
            border-radius: 16px;
            background: #f1f3f5;
            color: #868e96;
            font-size: 0.85rem;
        `;
        bubble.textContent = "Assistant is thinking...";
        wrapper.appendChild(bubble);
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function hideTyping() {
        const indicator = document.getElementById("typingIndicator");
        if (indicator) indicator.remove();
    }

    // ── Send message to backend ──────────────────────────────────────────
    async function sendMessage(message, isGreeting = false) {
        if (isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;

        if (!isGreeting && message) {
            addMessage("agent", message);
            history.push({ role: "agent", content: message });
        }

        showTyping();

        try {
            const payload = isGreeting
                ? { is_greeting: true, history: [] }
                : { message: message, is_greeting: false, history: history };

            const response = await fetch("/chatbot/message", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });

            const data = await response.json();
            hideTyping();

            if (data.reply) {
                addMessage("assistant", data.reply);
                history = data.history;
            } else {
                addMessage("assistant", "Something went wrong. Please try again.");
            }

        } catch (error) {
            hideTyping();
            addMessage("assistant", "Connection error. Please try again.");
        }

        isLoading = false;
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
    }

    // ── Event listeners ──────────────────────────────────────────────────
    sendBtn.addEventListener("click", () => {
        const message = messageInput.value.trim();
        if (!message) return;
        messageInput.value = "";
        sendMessage(message);
    });

    messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    clearBtn.addEventListener("click", () => {
        history = [];
        chatWindow.innerHTML = "";
        sendMessage(null, true);
    });

    // ── Auto-greet on page load ──────────────────────────────────────────
    window.addEventListener("load", () => {
        sendMessage(null, true);
    });
</script>
{% endblock %}
