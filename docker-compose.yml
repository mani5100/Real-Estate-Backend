services:

  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: real_estate_db

    # Secrets come from .env — not hardcoded here
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    # Persist data between container restarts
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Health check — app waits for this before starting
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    ports:
      - "5433:5432"  # expose on 5433 to avoid conflict with local postgres

  # ── FastAPI Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: real_estate_app

    # Secrets injected at runtime from .env
    # Never baked into the image
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DEBUG_MODE: ${DEBUG_MODE}
      APP_NAME: ${APP_NAME}
      PYTHONPATH: /app/src 

    ports:
      - "8000:8000"

    # Wait for DB to be healthy before starting app
    depends_on:
      db:
        condition: service_healthy

    # Run migrations then start app
    command: ["sh", "-c", "echo 'Running migrations...' && python -m alembic upgrade head && echo 'Starting application...' && gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120 --access-logfile - --error-logfile - src.real_estate_backend.main:app"]

    # Docker level health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ── Named volumes ─────────────────────────────────────────────
volumes:
  postgres_data: