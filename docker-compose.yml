services:

  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: real_estate_db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    ports:
      - "5433:5432"

  # ── Run migrations once then exit ───────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real_estate_migrate

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DEBUG_MODE: ${DEBUG_MODE}
      APP_NAME: ${APP_NAME}
      AI_BASE_URL: ${AI_BASE_URL}
      RATE_LIMIT: ${RATE_LIMIT}
      WINDOW_SECONDS: ${WINDOW_SECONDS}
      PYTHONPATH: /app/src

    depends_on:
      db:
        condition: service_healthy

    command: ["python", "-m", "alembic", "upgrade", "head"]

    # Exits after migration completes — expected behaviour
    restart: "no"

  # ── FastAPI Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: real_estate_app

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DEBUG_MODE: ${DEBUG_MODE}
      APP_NAME: ${APP_NAME}
      AI_BASE_URL: ${AI_BASE_URL}
      PYTHONPATH: /app/src
      RATE_LIMIT: ${RATE_LIMIT}
      WINDOW_SECONDS: ${WINDOW_SECONDS}

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    command: [
      "gunicorn",
      "-w", "4",
      "-k", "uvicorn.workers.UvicornWorker",
      "--bind", "0.0.0.0:8000",
      "--timeout", "120",
      "--access-logfile", "-",
      "--error-logfile", "-",
      "src.real_estate_backend.main:app"
    ]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Flask Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: real_estate_frontend

    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      API_BASE_URL: http://app:8000

    ports:
      - "5000:5000"

    depends_on:
      app:
        condition: service_healthy

# ── Named volumes ─────────────────────────────────────────────
volumes:
  postgres_data: